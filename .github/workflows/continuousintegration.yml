name: HTML CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar ferramentas
        run: |
          npm install -g htmlhint

      - name: Validar HTML
        run: htmlhint "**/*.html"
        
#Código acima gerado com assistência de IA.
#Ativo quando envia algo para o Branch ou abre um PR.
#Instala Node.js e ferramentas que vão ajudar a verificar possíveis erros no código.
